name: Build Firmware (Watcher W1)

on:
  push:
    branches: [main, develop]
    paths:
      - 'firmware/watcher/**'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    paths:
      - 'firmware/watcher/**'
  workflow_dispatch:

jobs:
  build:
    name: Build firmware (ESP-IDF 5.2)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware/watcher
          idf.py set-target esp32s3
          idf.py build

      - name: Size report
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware/watcher
          idf.py size-components | tail -50

      - name: Upload firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: bobby-firmware-${{ github.sha }}
          path: |
            firmware/watcher/build/*.bin
            firmware/watcher/build/*.elf
            firmware/watcher/build/bootloader/*.bin
            firmware/watcher/build/partition_table/*.bin
          retention-days: 30

  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/firmware-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bobby-firmware-${{ github.sha }}
          path: ./fw
      - uses: softprops/action-gh-release@v2
        with:
          files: ./fw/**/*.bin
          generate_release_notes: true
