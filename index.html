    <meta name="twitter:description" content="Buddy est un compagnon IA vocal temps réel pour les enfants de 5 à 12 ans. Histoires, jeux et apprentissage par la voix.">

    <style id="bobby-sleep-fallback-style">
      #bobby-sleep-fallback {
        display: none;
        position: fixed; inset: 0; z-index: 99999;
        background: #E8F0FE;
        flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; user-select: none; font-family: 'Nunito', sans-serif;
      }
      #bobby-sleep-fallback.visible { display: flex; }
      #bobby-sleep-fallback p { margin-top: 16px; font-size: 14px; color: rgba(0,0,0,0.35); font-weight: 700; }
      @keyframes bZ1 { 0%,100% { transform: translateY(0); opacity: 0.9; } 50% { transform: translateY(-6px); opacity: 0.5; } }
      @keyframes bZ2 { 0%,100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-8px); opacity: 0.3; } }
      @keyframes bZ3 { 0%,100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-10px); opacity: 0.2; } }
    </style>
  </head>

  <body>
    <!-- Fallback sleep screen shown if JS fails to load -->
    <div id="bobby-sleep-fallback" onclick="location.reload()">
      <svg viewBox="0 0 200 200" width="200" height="200">
        <!-- Closed eyes — gentle arcs -->
        <path d="M 58 95 Q 72 105 86 95" fill="none" stroke="rgba(80,160,120,0.6)" stroke-width="3" stroke-linecap="round" />
        <path d="M 114 95 Q 128 105 142 95" fill="none" stroke="rgba(80,160,120,0.6)" stroke-width="3" stroke-linecap="round" />
        <!-- Eyelids -->
        <rect x="55" y="76" width="34" height="14" rx="4" fill="rgba(160,170,180,0.5)" />
        <rect x="111" y="76" width="34" height="14" rx="4" fill="rgba(160,170,180,0.5)" />
        <!-- Tiny smile -->
        <path d="M 85 130 Q 100 138 115 130" fill="none" stroke="rgba(220,80,120,0.5)" stroke-width="2" stroke-linecap="round" />
        <!-- Cheeks -->
        <ellipse cx="65" cy="118" rx="14" ry="9" fill="rgba(255,200,200,0.25)" />
        <ellipse cx="135" cy="118" rx="14" ry="9" fill="rgba(255,200,200,0.25)" />
        <!-- Zzz -->
        <text x="148" y="68" fill="#7C3AED" font-size="20" font-weight="900" opacity="0.9" style="animation:bZ1 3s ease-in-out infinite">Z</text>
        <text x="160" y="50" fill="#7C3AED" font-size="14" font-weight="900" opacity="0.7" style="animation:bZ2 3s ease-in-out infinite 0.3s">z</text>
        <text x="168" y="36" fill="#7C3AED" font-size="10" font-weight="900" opacity="0.5" style="animation:bZ3 3s ease-in-out infinite 0.6s">z</text>
      </svg>
      <p>😴 Bobby dort... touche pour réveiller</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Apply saved background color to fallback
      try {
        var raw = localStorage.getItem('bobby_parent_settings');
        if (raw) {
          var bgMap = {"soft-blue":"#E8F0FE","soft-green":"#E8FEF0","soft-pink":"#FEE8F0","soft-purple":"#F0E8FE","soft-yellow":"#FEF8E8","white":"#FFFFFF","dark":"#1A1A2E","night":"#0D1B2A"};
          var s = JSON.parse(raw);
          var bgId = s && s.bobbyColors && s.bobbyColors.background || "soft-blue";
          var el = document.getElementById('bobby-sleep-fallback');
          if (el && bgMap[bgId]) el.style.background = bgMap[bgId];
        }
      } catch(e) {}

      // If React hasn't rendered within 8s, show Bobby sleeping
      window.__bobby_loaded = false;
      setTimeout(function() {
        if (!window.__bobby_loaded) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      }, 8000);

      // Catch module load errors
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('Loading module') !== -1 || e.message.indexOf('Failed to fetch') !== -1 || e.message.indexOf('404') !== -1)) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason));
        if (msg && (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('Loading module') !== -1 || msg.indexOf('dynamically imported module') !== -1 || msg.indexOf('404') !== -1)) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      });
    </script>
  </body>
</html>
