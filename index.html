    <style id="bobby-sleep-fallback-style">
      #bobby-sleep-fallback {
        display: none;
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; user-select: none; font-family: 'Nunito', sans-serif;
      }
      #bobby-sleep-fallback.visible { display: flex; }
      #bobby-sleep-fallback p { margin-top: 16px; font-size: 14px; color: rgba(147,197,253,0.5); animation: bPulse 2s ease-in-out infinite; }
      @keyframes bPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes bZ1 { 0%,100% { transform: translateY(0); opacity: 0.9; } 50% { transform: translateY(-6px); opacity: 0.5; } }
      @keyframes bZ2 { 0%,100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-8px); opacity: 0.3; } }
      @keyframes bZ3 { 0%,100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-10px); opacity: 0.2; } }
    </style>
  </head>

  <body>
    <!-- Fallback sleep screen shown if JS fails to load -->
    <div id="bobby-sleep-fallback" onclick="location.reload()">
      <svg viewBox="0 0 200 200" width="180" height="180">
        <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(100,200,255,0.15)" stroke-width="2" />
        <path d="M 60 90 Q 72 100 84 90" fill="none" stroke="rgba(100,200,255,0.6)" stroke-width="2.5" stroke-linecap="round" />
        <path d="M 116 90 Q 128 100 140 90" fill="none" stroke="rgba(100,200,255,0.6)" stroke-width="2.5" stroke-linecap="round" />
        <path d="M 85 125 Q 100 133 115 125" fill="none" stroke="rgba(100,200,255,0.4)" stroke-width="2" stroke-linecap="round" />
        <text x="145" y="65" fill="#6B21A8" font-size="18" font-weight="bold" opacity="0.9" style="animation:bZ1 3s ease-in-out infinite">Z</text>
        <text x="155" y="48" fill="#6B21A8" font-size="14" font-weight="bold" opacity="0.7" style="animation:bZ2 3s ease-in-out infinite 0.3s">z</text>
        <text x="162" y="35" fill="#6B21A8" font-size="10" font-weight="bold" opacity="0.5" style="animation:bZ3 3s ease-in-out infinite 0.6s">z</text>
      </svg>
      <p>Bobby dort...</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // If React hasn't rendered within 8s, show Bobby sleeping
      window.__bobby_loaded = false;
      setTimeout(function() {
        if (!window.__bobby_loaded) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      }, 8000);

      // Catch module load errors
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('Loading module') !== -1 || e.message.indexOf('Failed to fetch') !== -1 || e.message.indexOf('404') !== -1)) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason));
        if (msg && (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('Loading module') !== -1 || msg.indexOf('dynamically imported module') !== -1 || msg.indexOf('404') !== -1)) {
          var el = document.getElementById('bobby-sleep-fallback');
          if (el) el.classList.add('visible');
        }
      });
    </script>
  </body>
</html>
